  .room-inner {

  /* Tavoli */
  .table-item {
      position: absolute;
      width: 64px;
      height: 64px;
      user-select: none;
      touch-action: none;
      border: 2px solid #3e4552;
      background: #99c08c;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: box-shadow 0.2s ease, background-color 0.2s ease;

      overflow: visible; /* permette alla lista prenotazioni di uscire dal tavolo */
  }

  .table-square {

      height: 64px;
      border-radius: 0.5rem;
  }

  .table-rectangle {
      width: 80px;
      height: 64px;
      border-radius: 0.5rem;
  }

  .table-circle {

      height: 64px;
      border-radius: 9999px;

  .table-free {

      border-color: #3e4552;

  .table-occupied {

      border-color: #b91c1c;
  }

  .table-partial {
      background: #fef9c3;
      border-color: #a16207;

      left: 4px;
      display: flex;
      align-items: center;
      gap: 6px;

      font-weight: 700;
  }

  .table-capacity {

  .table-bookings {

      min-width: max-content;
      display: flex;
      flex-direction: column;
      gap: 3px;
      color: #000;
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;

  .table-booking-row {

      box-shadow: 0 1px 2px rgba(0,0,0,0.12);

      white-space: nowrap;
      overflow: hidden;

      width: 95px;
      touch-action: none; /* needed for touch drag */

  }

      margin-bottom: 2rem;
  }
  .box-timeslot-title {
      font-weight: bold;

  }
  .box-realtime {

  }
  .box-standard {

      background-color: #fff;

  .table-realtime-disabled {

  }

  .table-add-mode-target {

  }

  .room-floating-hint {

      border: none;
      background: rgba(255,255,255,.12);
      color: #fff;
      border-radius: 9999px;
      padding: 6px 10px;

<script>
    function roomBookingDnD(config = {}) {
        return {
            mode: config.mode ?? 'view',
            tables: config.tables ?? [],
    
            longPressDelay: 450,
            dragThreshold: 8,
    
            dragging: null,
            hoverTableId: null,
            suppressClicksUntil: 0,
    
            isTableModalOpen: false,
            selectedTable: null,
    
            pointerSession: null,
            pointerListeners: null,
    
            bookingMenu: {
                open: false,
                tableId: null,
                bookingId: null,
                x: 0,
                y: 0,
                label: '',
            },
    
            addTableMode: {
                active: false,
                bookingId: null,
                fromTableId: null,
                label: '',
            },
    
            dragPreview: {
                visible: false,
                x: 0,
                y: 0,
                label: '',
            },
    
            openTableModal(tableId) {
                console.log("ENTRATO MODAL TAVOLO " + tableId);
    
                const table = this.tables.find(t => t.id === tableId);
                if (!table) return;
    
                this.selectedTable = JSON.parse(JSON.stringify(table));
                this.isTableModalOpen = true;
                document.body.classList.add('overflow-hidden');
            },
    
            closeTableModal() {
                this.isTableModalOpen = false;
                this.selectedTable = null;
                document.body.classList.remove('overflow-hidden');
            },
    
            refreshSelectedTable() {
                if (!this.isTableModalOpen || !this.selectedTable?.id) return;
    
                const table = this.tables.find(t => t.id === this.selectedTable.id);
                if (!table) return;
    
                this.selectedTable = JSON.parse(JSON.stringify(table));
            },
    
            shouldIgnoreClick() {
                return Date.now() < this.suppressClicksUntil;
            },
    
            cancelInteractiveModes() {
                this.closeBookingMenu();
                this.cancelAddTableMode();
            },
    
            closeBookingMenu() {
                this.bookingMenu = {
                    open: false,
                    tableId: null,
                    bookingId: null,
                    x: 0,
                    y: 0,
                    label: '',
                };
            },
    
            openBookingMenu(tableId, bookingId, rowEl) {
                const table = this.tables.find(t => t.id === tableId);
                const booking = table?.bookings.find(b => b.id === bookingId);
                if (!booking || !rowEl) return;
    
                const rect = rowEl.getBoundingClientRect();
    
                this.bookingMenu = {
                    open: true,
                    tableId,
                    bookingId,
                    x: Math.round(rect.left + (rect.width / 2)),
                    y: Math.round(rect.top - 8),
                    label: `${booking.time} ${booking.customer}`,
                };
    
                this.dragging = null;
                this.hoverTableId = null;
                this.dragPreview.visible = false;
                this.suppressClicksUntil = Date.now() + 350;
            },
    
            isBookingMenuTarget(tableId, bookingId) {
                return this.bookingMenu.open
                    && this.bookingMenu.tableId === tableId
                    && this.bookingMenu.bookingId === bookingId;
            },
    
            beginAddTableMode() {
                if (!this.bookingMenu.open) return;
    
                this.addTableMode = {
                    active: true,
                    bookingId: this.bookingMenu.bookingId,
                    fromTableId: this.bookingMenu.tableId,
                    label: this.bookingMenu.label,
                };
    
                console.log('START ADD TABLE MODE', {
                    bookingId: this.addTableMode.bookingId,
                    fromTableId: this.addTableMode.fromTableId,
                });
    
                this.closeBookingMenu();
                this.suppressClicksUntil = Date.now() + 250;
            },
    
            cancelAddTableMode() {
                this.addTableMode = {
                    active: false,
                    bookingId: null,
                    fromTableId: null,
                    label: '',
                };
            },
    
            onBookingRowClick(tableId, bookingId, event) {
                if (this.shouldIgnoreClick()) return;
                if (this.addTableMode.active) return;
                if (this.bookingMenu.open) return;
    
                const table = this.tables.find(t => t.id === tableId);
                const booking = table?.bookings.find(b => b.id === bookingId);
    
                if (!booking) return;
    
                console.log('Booking clicked', { tableId, bookingId, booking });
    
                if (this.$wire && typeof this.$wire.openBooking === 'function') {
                    this.$wire.openBooking(bookingId);
                }
            },
    
            onTableHeaderClick(tableId) {
                if (this.addTableMode.active) {
                    this.onTableClick(tableId);
                    return;
                }
    
                if (this.shouldIgnoreClick()) return;
                this.openTableModal(tableId);
            },
    
            onTableClick(tableId) {
                if (!this.addTableMode.active) return;
    
                this.commitBookingAttach(
                    this.addTableMode.bookingId,
                    this.addTableMode.fromTableId,
                    tableId
                );
            },
    
            onBookingPointerDown(fromTableId, bookingId, event) {
                if (this.mode === 'edit') return;
                if (!event.isPrimary) return;
                if (this.addTableMode.active) return;
    
                const table = this.tables.find(t => t.id === fromTableId);
                const booking = table?.bookings.find(b => b.id === bookingId);
    
                if (!booking) return;
    
                this.closeBookingMenu();
    
                const rowEl = event.currentTarget;
    
                this.pointerSession = {
                    pointerId: event.pointerId,
                    fromTableId,
                    bookingId,
                    startX: event.clientX,
                    startY: event.clientY,
                    lastX: event.clientX,
                    lastY: event.clientY,
                    dragStarted: false,
                    menuOpened: false,
                    rowEl,
                    label: `${booking.time} ${booking.customer}`,
                    longPressTimer: window.setTimeout(() => {
                        if (!this.pointerSession) return;
                        if (this.pointerSession.pointerId !== event.pointerId) return;
                        if (this.pointerSession.dragStarted) return;
    
                        this.pointerSession.menuOpened = true;
                        this.openBookingMenu(fromTableId, bookingId, rowEl);
                    }, this.longPressDelay),
                };
    
                if (rowEl.setPointerCapture) {
                    rowEl.setPointerCapture(event.pointerId);
                }
    
                const move = (ev) => this.onGlobalPointerMove(ev);
                const up = (ev) => this.onGlobalPointerUp(ev);
                const cancel = (ev) => this.onGlobalPointerCancel(ev);
    
                this.pointerListeners = { move, up, cancel };
    
                window.addEventListener('pointermove', move);
                window.addEventListener('pointerup', up);
                window.addEventListener('pointercancel', cancel);
            },
    
            onGlobalPointerMove(event) {
                if (!this.pointerSession) return;
                if (event.pointerId !== this.pointerSession.pointerId) return;
    
                const session = this.pointerSession;
                session.lastX = event.clientX;
                session.lastY = event.clientY;
    
                if (session.menuOpened) {
                    return;
                }
    
                const dx = event.clientX - session.startX;
                const dy = event.clientY - session.startY;
                const distance = Math.hypot(dx, dy);
    
                if (!session.dragStarted && distance < this.dragThreshold) {
                    return;
                }
    
                this.clearLongPressTimer(session);
    
                if (!session.dragStarted) {
                    session.dragStarted = true;
    
                    this.dragging = {
                        bookingId: session.bookingId,
                        fromTableId: session.fromTableId,
                    };
    
                    this.suppressClicksUntil = Date.now() + 250;
                    this.closeBookingMenu();
                    this.cancelAddTableMode();
                }
    
                event.preventDefault();
    
                this.dragPreview.visible = true;
                this.dragPreview.x = event.clientX + 14;
                this.dragPreview.y = event.clientY + 14;
                this.dragPreview.label = session.label;
    
                this.hoverTableId = this.findDropTableIdAtPoint(event.clientX, event.clientY);
            },
    
            async onGlobalPointerUp(event) {
                if (!this.pointerSession) return;
                if (event.pointerId !== this.pointerSession.pointerId) return;
    
                const session = this.pointerSession;
    
                this.clearLongPressTimer(session);
                this.releasePointerCapture(session, event.pointerId);
                this.removePointerListeners();
    
                const targetTableId = session.dragStarted
                    ? this.findDropTableIdAtPoint(event.clientX, event.clientY)
                    : null;
    
                const dragged = session.dragStarted;
                const menuOpened = session.menuOpened;
                const bookingId = session.bookingId;
                const fromTableId = session.fromTableId;
    
                this.pointerSession = null;
                this.dragPreview.visible = false;
                this.hoverTableId = null;
    
                if (menuOpened) {
                    this.suppressClicksUntil = Date.now() + 250;
                    return;
                }
    
                if (!dragged) {
                    return;
                }
    
                this.suppressClicksUntil = Date.now() + 250;
    
                if (!targetTableId || targetTableId === fromTableId) {
                    this.dragging = null;
                    return;
                }
    
                await this.commitBookingMove(bookingId, fromTableId, targetTableId);
            },
    
            onGlobalPointerCancel(event) {
                if (!this.pointerSession) return;
                if (event.pointerId !== this.pointerSession.pointerId) return;
    
                this.clearLongPressTimer(this.pointerSession);
                this.releasePointerCapture(this.pointerSession, event.pointerId);
                this.removePointerListeners();
    
                this.pointerSession = null;
                this.dragging = null;
                this.hoverTableId = null;
                this.dragPreview.visible = false;
            },
    
            clearLongPressTimer(session) {
                if (!session?.longPressTimer) return;
                window.clearTimeout(session.longPressTimer);
                session.longPressTimer = null;
            },
    
            releasePointerCapture(session, pointerId) {
                const rowEl = session?.rowEl;
    
                if (
                    rowEl &&
                    rowEl.releasePointerCapture &&
                    rowEl.hasPointerCapture &&
                    rowEl.hasPointerCapture(pointerId)
                ) {
                    rowEl.releasePointerCapture(pointerId);
                }
            },
    
            removePointerListeners() {
                if (!this.pointerListeners) return;
    
                window.removeEventListener('pointermove', this.pointerListeners.move);
                window.removeEventListener('pointerup', this.pointerListeners.up);
                window.removeEventListener('pointercancel', this.pointerListeners.cancel);
    
                this.pointerListeners = null;
            },
    
            findDropTableIdAtPoint(clientX, clientY) {
                const el = document.elementFromPoint(clientX, clientY);
                const dropZone = el?.closest?.('[data-drop-table-id]');
    
                return dropZone ? dropZone.dataset.dropTableId : null;
            },
    
            isDraggedBooking(tableId, bookingId) {
                return this.dragging?.bookingId === bookingId
                    && this.dragging?.fromTableId === tableId;
            },
    
            hasBookingOnTable(bookingId, tableId) {
                const table = this.tables.find(t => t.id === tableId);
                return !!table?.bookings.some(b => b.id === bookingId);
            },
    
            async commitBookingMove(bookingId, fromTableId, targetTableId) {
                const snapshot = JSON.parse(JSON.stringify(this.tables));
    
                const moved = this.moveBookingLocally(
                    bookingId,
                    fromTableId,
                    targetTableId
                );
    
                if (!moved) {
                    this.dragging = null;
                    return;
                }
    
                console.log('BOOKING MOVED', {
                    bookingId,
                    fromTableId,
                    targetTableId,
                });
    
                try {
                    if (this.$wire && typeof this.$wire.moveBooking === 'function') {
                        await this.$wire.moveBooking(
                            bookingId,
                            fromTableId,
                            targetTableId
                        );
                    } else {
                        console.log('Mock Livewire moveBooking', {
                            bookingId,
                            fromTableId,
                            targetTableId,
                        });
                    }
                } catch (error) {
                    this.tables = snapshot;
                    console.error(error);
                } finally {
                    this.dragging = null;
                    this.refreshSelectedTable();
                }
            },
    
            async commitBookingAttach(bookingId, fromTableId, targetTableId) {
                if (!bookingId || !fromTableId || !targetTableId) {
                    this.cancelAddTableMode();
                    return;
                }
    
                if (fromTableId === targetTableId) {
                    this.cancelAddTableMode();
                    return;
                }
    
                const snapshot = JSON.parse(JSON.stringify(this.tables));
    
                const attached = this.attachBookingLocally(
                    bookingId,
                    fromTableId,
                    targetTableId
                );
    
                if (!attached) {
                    this.cancelAddTableMode();
                    return;
                }
    
                console.log('BOOKING ATTACHED TO EXTRA TABLE', {
                    bookingId,
                    fromTableId,
                    targetTableId,
                });
    
                try {
                    if (this.$wire && typeof this.$wire.attachBookingToTable === 'function') {
                        await this.$wire.attachBookingToTable(
                            bookingId,
                            fromTableId,
                            targetTableId
                        );
                    } else {
                        console.log('Mock Livewire attachBookingToTable', {
                            bookingId,
                            fromTableId,
                            targetTableId,
                        });
                    }
                } catch (error) {
                    this.tables = snapshot;
                    console.error(error);
                } finally {
                    this.cancelAddTableMode();
                    this.refreshSelectedTable();
                }
            },
    
            async detachBookingFromMenu() {
                const bookingId = this.bookingMenu.bookingId;
                const tableId = this.bookingMenu.tableId;
    
                this.closeBookingMenu();
    
                if (!bookingId || !tableId) return;
    
                const snapshot = JSON.parse(JSON.stringify(this.tables));
    
                const detached = this.detachBookingLocally(bookingId, tableId);
    
                if (!detached) return;
    
                console.log('BOOKING DETACHED FROM TABLE', {
                    bookingId,
                    tableId,
                });
    
                try {
                    if (this.$wire && typeof this.$wire.detachBookingFromTable === 'function') {
                        await this.$wire.detachBookingFromTable(bookingId, tableId);
                    } else {
                        console.log('Mock Livewire detachBookingFromTable', {
                            bookingId,
                            tableId,
                        });
                    }
                } catch (error) {
                    this.tables = snapshot;
                    console.error(error);
                } finally {
                    this.refreshSelectedTable();
                }
            },
    
            moveBookingLocally(bookingId, fromTableId, toTableId) {
                const fromTable = this.tables.find(t => t.id === fromTableId);
                const toTable = this.tables.find(t => t.id === toTableId);
    
                if (!fromTable || !toTable) return false;
    
                const bookingIndex = fromTable.bookings.findIndex(b => b.id === bookingId);
                if (bookingIndex === -1) return false;
    
                const alreadyExistsOnTarget = toTable.bookings.some(b => b.id === bookingId);
                const [booking] = fromTable.bookings.splice(bookingIndex, 1);
    
                if (!alreadyExistsOnTarget) {
                    toTable.bookings.push({ ...booking });
                    toTable.bookings.sort((a, b) => a.time.localeCompare(b.time));
                }
    
                return true;
            },
    
            attachBookingLocally(bookingId, fromTableId, targetTableId) {
                const fromTable = this.tables.find(t => t.id === fromTableId);
                const targetTable = this.tables.find(t => t.id === targetTableId);
    
                if (!fromTable || !targetTable) return false;
                if (fromTableId === targetTableId) return false;
    
                const booking = fromTable.bookings.find(b => b.id === bookingId);
                if (!booking) return false;
    
                const alreadyExists = targetTable.bookings.some(b => b.id === bookingId);
                if (alreadyExists) return false;
    
                targetTable.bookings.push({ ...booking });
                targetTable.bookings.sort((a, b) => a.time.localeCompare(b.time));
    
                return true;
            },
    
            detachBookingLocally(bookingId, tableId) {
                const table = this.tables.find(t => t.id === tableId);
                if (!table) return false;
    
                const bookingIndex = table.bookings.findIndex(b => b.id === bookingId);
                if (bookingIndex === -1) return false;
    
                table.bookings.splice(bookingIndex, 1);
                return true;
            },
    
            tableStyle(table) {
                return `transform: translate(${table.x}px, ${table.y}px) rotate(0deg);`;
            },
    
            tableCssClasses(table) {
                const classes = ['table-item'];
    
                classes.push(
                    table.shape === 'rectangle'
                        ? 'table-rectangle'
                        : table.shape === 'circle'
                            ? 'table-circle'
                            : 'table-square'
                );
    
                classes.push(this.tableStatusClass(table));
    
                if (this.hoverTableId === table.id) {
                    classes.push('table-drop-hover');
                }
    
                if (this.addTableMode.active) {
                    if (table.id === this.addTableMode.fromTableId) {
                        classes.push('table-add-mode-source');
                    } else if (!this.hasBookingOnTable(this.addTableMode.bookingId, table.id)) {
                        classes.push('table-add-mode-target');
                    }
                }
    
                return classes.join(' ');
            },
    
            tableStatusClass(table) {
                if (table.bookings.length === 0) return 'table-free';
    
                return table.bookings.length >= table.max
                    ? 'table-occupied'
                    : 'table-partial';
            }
        };
    }
</script>
